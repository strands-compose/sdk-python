<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strands Compose</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0f172a;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            user-select: none;
        }
        .container {
            text-align: center;
        }
        .logo-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 2rem;
        }
        .logo-section img {
            width: 180px;
            height: auto;
        }
        .logo-text {
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            line-height: 0.9;
            letter-spacing: -0.03em;
        }
        .logo-text .strands {
            font-size: 72px;
            color: #1FFB8B;
            font-weight: 600;
        }
        .logo-text .compose {
            font-size: 56px;
            color: #6B7280;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <img src="img/logo.png" alt="strands-compose">
            <div class="logo-text">
                <div class="strands">strands</div>
                <div class="compose">Compose</div>
            </div>
        </div>
    </div>
</body>
</html>

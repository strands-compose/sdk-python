# 11_multi_file_config — agents configuration
#
# Agent definitions and entry point.
# This file is intentionally incomplete — it has no models defined.
# Pair it with base.yaml to get a runnable config:
#
#   load(["base.yaml", "agents.yaml"])
#
# The 'default' model referenced here is defined in base.yaml.

agents:
  assistant:
    model: default    # defined in base.yaml
    system_prompt: |
      You are a helpful and friendly assistant.
      Keep answers clear and concise.

entry: assistant
